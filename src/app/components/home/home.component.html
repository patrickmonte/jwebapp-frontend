<div class="home-container">
  <mat-card class="home-card">
    <mat-card-header>
      <mat-card-title>Welcome!</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p *ngIf="isLoggedIn()">You are logged in.</p>
      <p *ngIf="!isLoggedIn()">Please log in or register.</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="accent" *ngIf="isLoggedIn()" (click)="logout()">Logout</button>
      <button mat-raised-button color="primary" *ngIf="!isLoggedIn()" routerLink="/login">Login</button>
      <button mat-raised-button color="accent" *ngIf="!isLoggedIn()" routerLink="/register">Register</button>
    </mat-card-actions>
  </mat-card>
</div>
